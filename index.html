<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After School Lessons</title>
    <link rel="stylesheet" href="AfterSchoolLessons.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="AfterSchoolLessons.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<body>
<div id="app">
    <header>
        <button v-on:click="showCheckout" v-if="cart.length > 0">
            {{cart.length}} <i class="fa-solid fa-cart-shopping"></i> CheckOut
        </button>
        <button disabled v-else>
            <i class="fa-solid fa-cart-shopping"></i> CheckOut
        </button>   
    </header>

    <main>
        <div v-if='showProduct'>
            <h1>{{sitename}}</h1>

            <div class="search-bar">
                <input type="text" v-model="searchText" placeholder="Search lessons..." />
            </div>

            <div v-if="products.length === 0" style="text-align: center; padding: 20px;">
                <p>Connecting to server... please wait (Render may take 30s to wake up)</p>
            </div>

            <div v-for="product in filteredProducts" :key="product._id" class="product-card">
                <img v-bind:src="product.image" alt="Lesson Image" style="width:100px;">
                <div>
                    <h2>{{product.title}}</h2>
                    <p>Location: {{product.location}}</p>
                    <p>Price: ${{product.price}}</p>
                    <p>Spaces: {{product.availableInventory - cartCount(product._id)}}</p>
                    
                    <button v-on:click="addtocart(product)" v-if="canAddToCart(product)">Add to cart</button>
                    <button disabled v-else>Out of Stock</button>
                </div>
            </div>
        </div>

        <div v-else>
            <h1>Checkout</h1>
            <button v-on:click="showCheckout">Back to Lessons</button>
            <div style="margin-top: 20px;">
                <p>First Name: <input v-model.trim="order.firstname" /></p>
                <p>Last Name: <input v-model.trim="order.lastname" /></p>
                <p>Phone: <input v-model.number="order.phone" /></p>
                <button v-if="isFormValid" v-on:click="submitForm">Place Order</button>
                <button disabled v-else>Complete Form</button>
            </div>
        </div>
    </main>
</div>

<script type="text/javascript">
// This MUST match your Render URL exactly
const BASE_URL = "https://coursework-backend-1-irvy.onrender.com";

let webstore = new Vue({
    el: '#app',
    data: {
        sitename: "After School Lessons",
        products: [], // Loaded from MongoDB
        cart: [],
        showProduct: true,
        sortBy: "title",
        sortOrder: "asc",
        searchText: "",
        order: {
            firstname: '',
            lastname: '',
            phone: ''
        }
    },
    created() {
        this.fetchLessons();
    },
    watch: {
        searchText: function(newVal) {
            this.fetchSearchResults(newVal);
        }
    },
    methods: {
        async fetchLessons() {
            try {
                const res = await fetch(`${BASE_URL}/lessons`);
                if (!res.ok) throw new Error("Server error");
                this.products = await res.json();
            } catch (err) {
                console.log("Waiting for Render to wake up...");
                // Retry every 3 seconds so the page doesn't just stay blank
                setTimeout(this.fetchLessons, 3000);
            }
        },
        async fetchSearchResults(query) {
            try {
                const res = await fetch(`${BASE_URL}/search?q=${query}`);
                this.products = await res.json();
            } catch (err) {
                console.log("Search error", err);
            }
        },
        addtocart(product) { this.cart.push(product); },
        canAddToCart(product) { 
            return product.availableInventory > this.cartCount(product._id); 
        },
        cartCount(id) { 
            return this.cart.filter(p => p._id === id).length; 
        },
        showCheckout() { this.showProduct = !this.showProduct; },
        async submitForm() {
            // POST the order to the backend
            try {
                const res = await fetch(`${BASE_URL}/order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: this.order.firstname + " " + this.order.lastname,
                        phone: this.order.phone,
                        lessonIDs: this.cart.map(item => item._id)
                    })
                });
                if (res.ok) {
                    alert('Order Successful!');
                    this.cart = [];
                    this.showProduct = true;
                    this.fetchLessons(); // Refresh inventory
                }
            } catch (e) { alert("Failed to place order."); }
        }
    },
    computed: {
        isFormValid() {
            return this.order.firstname.length > 0 && 
                   this.order.lastname.length > 0 && 
                   String(this.order.phone).length > 5;
        },
        filteredProducts() {
            let list = [...this.products];
            list.sort((a, b) => {
                let A = a[this.sortBy], B = b[this.sortBy];
                if (typeof A === "string") { A = A.toLowerCase(); B = B.toLowerCase(); }
                return this.sortOrder === "asc" ? (A > B ? 1 : -1) : (A < B ? 1 : -1);
            });
            return list;
        }
    }
});
</script>
</body>
</html>
