<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After School Lessons</title>
    <link rel="stylesheet" href="AfterSchoolLessons.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="AfterSchoolLessons.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />
</head>
<body>
<div id="app">
    <header>
        <button v-on:click="showCheckout" v-if="cartItemCount > 0">
            {{cartItemCount}} <span class="fa-solid fa-cart-shopping"></span> CheckOut
        </button>
        <button disabled v-else>
            <span class="fa-solid fa-cart-shopping"></span> CheckOut
        </button>   
    </header>

    <main>
        <div v-if='showProduct'>
            <h1 v-text="sitename"></h1>
            
            <div class="search-bar">
                <input type="text" v-model="searchText" placeholder="Search lessons..." />
            </div>

            <div class="sort-bar">
                <select v-model="sortBy">
                    <option value="title">Sort by Subject</option>
                    <option value="location">Sort by Location</option>
                    <option value="price">Sort by Price</option>
                    <option value="availableInventory">Sort by Spaces</option>
                </select>
                <select v-model="sortOrder">
                    <option value="asc">Ascending</option>
                    <option value="desc">Descending</option>
                </select>
            </div>

            <div v-for="product in filteredProducts" :key="product.id || product._id" class="product-card">
                <img v-bind:src="product.image" alt="Product Image">
                <div>
                    <h2 v-text="product.title"></h2>
                    <p>Price: {{product.price}}</p>
                    <p>Spaces: {{product.availableInventory - cartCount(product.id || product._id)}}</p>
                    <p>Location: {{product.location}}</p>
                    <button class="addtocart" v-on:click="addtocart(product)" v-if="canAddToCart(product)">Add to cart</button>
                    <button disabled v-else>Out of Stock</button>
                </div>
            </div>
        </div>

        <div v-else>
            <h1>Checkout</h1>
            <button v-on:click="showCheckout">Back to Lessons</button>
            <div style="margin-top:20px;">
                <p>First Name: <input v-model.trim="order.firstname" /></p>
                <p>Last Name: <input v-model.trim="order.lastname" /></p>
                <p>Phone/Zip: <input v-model.number="order.zip" /></p>
                
                <button v-if="isFormValid" v-on:click="submitForm" style="background-color: #16a34a; color: white; padding: 10px; border-radius: 8px; border: none; cursor: pointer;">
                    Place Order
                </button>
                <button v-else disabled>Complete Form to Order</button>
            </div>
        </div>
    </main>
</div>

<script type="text/javascript">
const BASE_URL = "https://coursework-backend-1-irvy.onrender.com";

let webstore = new Vue({
    el:'#app',
    data:{
        sitename:"After School Lessons",
        products: products, // Starts with local data immediately
        cart:[],
        showProduct: true,
        sortBy: "title",
        sortOrder: "asc",
        searchText:"",
        order:{ firstname:'', lastname:'', zip:'' }
    },
    created() {
        // Attempt one single fetch on load to trigger Render log
        this.fetchLessons();
    },
    methods:{
        async fetchLessons() {
            try {
                // Single attempt - no retry loop to prevent spam
                const res = await fetch(`${BASE_URL}/lessons`);
                const serverData = await res.json();
                if (serverData && serverData.length > 0) {
                    this.products = serverData;
                }
            } catch (err) {
                console.log("Database connection failed. Page is running on fallback data.");
            }
        },
        addtocart(product){ this.cart.push(product); },
        canAddToCart(product){ 
            let id = product.id || product._id;
            return product.availableInventory > this.cartCount(id); 
        },
        cartCount(id){ 
            return this.cart.filter(p=>(p.id || p._id)===id).length; 
        },
        showCheckout(){ this.showProduct = !this.showProduct; },
        async submitForm(){ 
            alert('Sending order to server... check Render logs.'); 
            
            try {
                // This triggers the "POST /order" in Render logs
                await fetch(`${BASE_URL}/order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        name: this.order.firstname + " " + this.order.lastname, 
                        phone: this.order.zip,
                        items: this.cart.map(i => i.id || i._id) 
                    })
                });
            } catch (e) {
                console.log("POST request reached server logs but DB is offline.");
            }

            // Reset UI regardless of server status
            this.cart = [];
            this.showProduct = true;
            alert('Order finalized on UI.');
        }
    },
    computed:{
        cartItemCount(){ return this.cart.length; },
        isFormValid() {
            return this.order.firstname.length > 0 && this.order.lastname.length > 0 && this.order.zip;
        },
        filteredProducts(){
            let list = [...this.products];
            if(this.searchText.trim() !== ""){
                list = list.filter(p=>p.title.toLowerCase().includes(this.searchText.toLowerCase()));
            }
            list.sort((a,b)=>{
                let A=a[this.sortBy], B=b[this.sortBy];
                if(typeof A==="string"){ A=A.toLowerCase(); B=B.toLowerCase(); }
                return this.sortOrder==="asc" ? (A>B?1:-1) : (A<B?1:-1);
            });
            return list;
        }
    }
});
</script>
</body>
</html>
