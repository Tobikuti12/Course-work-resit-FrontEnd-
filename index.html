<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>After School Lessons</title>
    <link rel="stylesheet" href="AfterSchoolLessons.css">
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
    <script src="AfterSchoolLessons.js"></script>
</head>
<body>
<div id="app">
    <header>
        <button v-on:click="showCheckout">Cart ({{cart.length}})</button>
    </header>

    <main v-if="showProduct">
        <input type="text" v-model="searchText" placeholder="Search lessons...">
        
        <div v-for="product in products" :key="product._id" class="product-card">
            <img :src="product.image" style="width:100px">
            <h2>{{product.title}}</h2>
            <p>Location: {{product.location}}</p>
            <p>Price: {{product.price}}</p>
            <p>Spaces: {{product.availableInventory - cartCount(product._id)}}</p>
            <button v-on:click="addtocart(product)" v-if="product.availableInventory > cartCount(product._id)">Add to Cart</button>
        </div>
    </main>
</div>

<script>
// IMPORTANT: Change this to your Render URL if testing live
const BASE_URL = "https://coursework-backend-1-irvy.onrender.com";

new Vue({
    el: '#app',
    data: {
        products: [],
        cart: [],
        showProduct: true,
        searchText: ""
    },
    created() {
        this.fetchLessons();
    },
    watch: {
        searchText: function(val) {
            this.fetchSearchResults(val);
        }
    },
    methods: {
        async fetchLessons() {
            try {
                const res = await fetch(`${BASE_URL}/lessons`);
                this.products = await res.json();
            } catch (e) { console.log("Retrying..."); setTimeout(this.fetchLessons, 2000); }
        },
        async fetchSearchResults(q) {
            const res = await fetch(`${BASE_URL}/search?q=${q}`);
            this.products = await res.json();
        },
        addtocart(p) { this.cart.push(p); },
        cartCount(id) { return this.cart.filter(item => item._id === id).length; },
        showCheckout() { this.showProduct = !this.showProduct; }
    }
});
</script>
</body>
</html>
